format_version: 10
pipelines:
  backend:
    environment_variables:
      app_version: ""
      component: backend
    group: defaultGroup
    label_template: ${COUNT}
    lock_behavior: none
    display_order: -1
    materials:
      ansible:
        git: https://github.com/kn-10/expense-ansible.git
        shallow_clone: false
        auto_update: true
        branch: main
    stages:
      - DEV:
          fetch_materials: true
          clean_workspace: false
          approval:
            type: manual
          jobs:
            deployment:
              timeout: 0
              tasks:
                - exec:
                    command: bash
                    arguments: [ "scripts/deployment.sh"]
#                - exec:
#                    command: ansible-playbook
#                    arguments: ["-i", "backend-dev.kdevops.online,", "-e", "ansible_user=centos", "-e", "ansible_password=DevOps321", "-e", "service_name=backend", "-e", "env=dev", "expense.yml", "-e", "app_version=${app_version}"]


      - QA:
          fetch_materials: true
          clean_workspace: false
          approval:
            type: manual
            allow_only_on_success: true
          jobs:
            deployment:
              timeout: 0
              tasks:
                - exec:
                    command: ls
                    arguments:
                      - -l
                      - -A

      - UAT:
          fetch_materials: true
          clean_workspace: false
          approval:
            type: manual
            allow_only_on_success: true
          jobs:
            deployment:
              timeout: 0
              tasks:
                - exec:
                    command: ls
                    arguments:
                      - -l
                      - -A

      - PROD:
          fetch_materials: true
          clean_workspace: false
          approval:
            type: manual
            allow_only_on_success: true
          jobs:
            deployment:
              timeout: 0
              tasks:
                - exec:
                    command: ls
                    arguments:
                      - -l
                      - -A